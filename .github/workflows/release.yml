name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.4.1). Leave empty to use the pushed tag.'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          PLUGIN_VERSION="$(grep -E "define\( 'XDWP_VERSION'" xorro-direct-wallet-payments-woocommerce.php | sed -E "s/.*'([0-9.]+)'.*/\1/")"
          echo "plugin_version=${PLUGIN_VERSION}" >> "$GITHUB_OUTPUT"
          if [ "${VERSION}" != "${PLUGIN_VERSION}" ]; then
            echo "Tag version ${VERSION} does not match plugin ${PLUGIN_VERSION}" >&2
            exit 1
          fi

      - name: Build WordPress ZIP
        run: |
          chmod +x bin/build-zip.sh
          bin/build-zip.sh "${RUNNER_TEMP}"
          cp "${RUNNER_TEMP}/xorro-direct-wallet-payments-woocommerce.zip" "xorro-direct-wallet-payments-woocommerce-${{ steps.meta.outputs.version }}.zip"
          cp "${RUNNER_TEMP}/xorro-direct-wallet-payments-woocommerce-${{ steps.meta.outputs.version }}.zip.sha256" .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: xorro-direct-wallet-payments-woocommerce-${{ steps.meta.outputs.version }}.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          NOTES="$(awk "/^= ${VERSION} =/{flag=1; next} /^= /{flag=0} flag" readme.txt | sed '/^$/d' | sed 's/^\* /- /')"
          if [ -z "${NOTES}" ]; then
            NOTES="${NAME} ${VERSION} WordPress plugin package."
          fi
          BODY=$(printf '%s\n\n%s\n\n%s\n%s\n' \
            "## ${NAME} ${VERSION}" \
            "${NOTES}" \
            "Install via **Plugins → Add New → Upload** using \`xorro-direct-wallet-payments-woocommerce-${VERSION}.zip\`." \
            "This release is published with immutable release + build provenance attestations when enabled on the repository.")
          gh release create "${TAG}" \
            --title "${NAME} ${VERSION}" \
            --notes "${BODY}" \
            --target "${{ github.sha }}" \
            "xorro-direct-wallet-payments-woocommerce-${VERSION}.zip#xorro-direct-wallet-payments-woocommerce-${VERSION}.zip (WordPress install package)" \
            "xorro-direct-wallet-payments-woocommerce-${VERSION}.zip.sha256#SHA-256 checksum"
